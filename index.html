<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KLIO PREMIX</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="KLIO PREMIX">
    
    <link rel="apple-touch-icon" href="images.png">
    <link rel="icon" type="image/png" href="images.png">
    
    <link rel="manifest" href="manifest.json">
    
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0e1310; /* Βαθύ τροπικό σκούρο πράσινο/μαύρο */
            --card-bg: #171e1a;  /* Σκούρο background για τις κάρτες */
            --accent-color: #ffd32a; /* Αρχικό Tiki Κίτρινο - Αλλάζει δυναμικά */
            --text-color: #ffffff;
            --text-muted: #8fa196;
        }

        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: calc(40px + env(safe-area-inset-top)) 20px 40px 20px;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.4s ease;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
        }

        header h1 {
            font-family: 'Fredoka', sans-serif;
            font-size: 32px;
            font-weight: 700;
            color: var(--accent-color);
            margin: 0;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            transition: color 0.4s ease;
        }

        .section-title {
            font-family: 'Fredoka', sans-serif;
            font-size: 15px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 12px;
            font-weight: 500;
            letter-spacing: 0.8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Cocktail Selector Grid */
        .cocktail-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }

        .cocktail-btn {
            background-color: var(--card-bg);
            border: 2px solid transparent;
            border-radius: 16px;
            padding: 14px 8px;
            color: var(--text-color);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            word-wrap: break-word;
        }

        .cocktail-btn.active {
            border-color: var(--accent-color);
            background-color: rgba(0, 0, 0, 0.2);
            color: var(--accent-color);
            transform: scale(1.02);
            box-shadow: 0 0 12px rgba(0, 0, 0, 0.3);
        }

        /* Slider Section */
        .slider-container {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .volume-display {
            font-family: 'Fredoka', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--accent-color);
            transition: color 0.4s ease;
        }

        .slider-input {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 10px;
            border-radius: 5px;
            outline: none;
            margin: 20px 0;
            padding: 0;
            background: #25302a;
        }

        /* Απόλυτα κεντραρισμένο 🧪 χωρίς background πλαίσιο ή σκιές */
        .slider-input::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 36px;
            height: 36px;
            background: transparent url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 36 36"><text y="31" x="18" font-size="32" text-anchor="middle">🧪</text></svg>') no-repeat center;
            cursor: pointer;
            border: none !important;
            box-shadow: none !important;
            outline: none !important;
            transition: transform 0.1s ease;
        }
        
        .slider-input::-webkit-slider-thumb:active {
            transform: scale(1.2);
        }

        .slider-input::-moz-range-thumb {
            width: 36px;
            height: 36px;
            background: transparent url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 36 36"><text y="31" x="18" font-size="32" text-anchor="middle">🧪</text></svg>') no-repeat center;
            cursor: pointer;
            border: none !important;
            box-shadow: none !important;
            outline: none !important;
        }

        .slider-labels {
            display: flex;
            justify-content: space-between;
            color: var(--text-muted);
            font-size: 12px;
            padding: 0 2px;
            font-weight: 500;
        }

        /* Results / Ingredients Section */
        .ingredients-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .ingredient-row {
            display: flex;
            justify-content: space-between;
            padding: 14px 0;
            border-bottom: 1px solid #25302a;
            font-size: 16px;
        }

        .ingredient-row:last-child {
            border-bottom: none;
        }

        .ing-name {
            font-weight: 500;
        }

        .ing-amount {
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            color: var(--accent-color);
            transition: color 0.4s ease;
        }

        /* Service info footer inside card */
        .service-info {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 2px dashed #25302a;
            font-size: 14px;
            color: #4cd137; /* Tiki Green */
            font-weight: 600;
            line-height: 1.5;
        }
        
        .service-info span {
            color: var(--text-muted);
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <header>
        <h1>🗿 Klio Premix 🌴</h1>
    </header>

    <div class="section-title">🍹 COCKTAIL</div>
    <div class="cocktail-selector">
        <button class="cocktail-btn active" onclick="selectCocktail('happy_hawaiian', this)">🌴 Happy Hawaiian</button>
        <button class="cocktail-btn" onclick="selectCocktail('three_birds', this)">🦜 Three Little Birds</button>
        <button class="cocktail-btn" onclick="selectCocktail('tiki_tijuana', this)">🌵 Tiki in Tijuana</button>
        <button class="cocktail-btn" onclick="selectCocktail('mama_africa', this)">🌍 Mama Africa</button>
        <button class="cocktail-btn" onclick="selectCocktail('kyoto', this)">🌸 Kyoto</button>
        <button class="cocktail-btn" onclick="selectCocktail('tiki_zombie', this)">🧟 Tiki Zombie</button>
        <button class="cocktail-btn" onclick="selectCocktail('bahama_mama', this)">🥥 Bahama Mama</button>
        <button class="cocktail-btn" onclick="selectCocktail('negroni', this)">🍊 Negroni</button>
    </div>

    <div class="slider-container">
        <div class="slider-header">
            <span class="section-title" style="margin:0;">🧪 PREMIX AMOUNT</span>
            <div class="volume-display" id="volumeDisplay">0 ml</div>
        </div>
        <input type="range" min="0" max="10" value="0" class="slider-input" id="premixSlider" oninput="updateValues()">
        <div class="slider-labels">
            <span>0ml</span>
            <span>500ml</span>
            <span>1 lt</span>
        </div>
    </div>

    <div class="section-title">📋 RECIPE</div>
    <div class="ingredients-card">
        <div id="ingredientsList"></div>
        <div class="service-info" id="serviceContainer">
            <span>💡 Service:</span>
            <div id="serviceText"></div>
        </div>
    </div>

    <script>
        const recipes = {
            happy_hawaiian: {
                name: "Happy Hawaiian",
                color: "#00cbc6", /* Τροπικό γαλάζιο */
                ingredients: [
                    { name: "Blend of rums", baseAmount: 480, unit: "ml" },
                    { name: "Lemon juice", baseAmount: 160, unit: "ml" },
                    { name: "Creme de cacao", baseAmount: 120, unit: "ml" },
                    { name: "Mango puree", baseAmount: 80, unit: "ml" },
                    { name: "Passion fruit puree", baseAmount: 80, unit: "ml" },
                    { name: "Falernum", baseAmount: 40, unit: "ml" }
                ],
                service: "120ml Premix + 40ml Pineapple juice"
            },
            three_birds: {
                name: "Three Little Birds",
                color: "#ffbb00", /* Κίτρινο της μπανάνας */
                ingredients: [
                    { name: "Plantation Original dark", baseAmount: 500, unit: "ml" },
                    { name: "Banana puree", baseAmount: 200, unit: "ml" },
                    { name: "Lemon juice", baseAmount: 200, unit: "ml" },
                    { name: "Salted caramel", baseAmount: 100, unit: "ml" },
                    { name: "Angostura bitters", baseAmount: 10, unit: "σταγόνες / dashes" }
                ],
                service: "100ml Premix + 40ml Pineapple juice"
            },
            tiki_tijuana: {
                name: "Tiki in Tijuana",
                color: "#4cd137", /* Πράσινο της αγαύης */
                ingredients: [
                    { name: "Tequila", baseAmount: 550, unit: "ml" },
                    { name: "Mango puree", baseAmount: 220, unit: "ml" },
                    { name: "Yuzu liqueur", baseAmount: 110, unit: "ml" },
                    { name: "Agave syrup", baseAmount: 110, unit: "ml" }
                ],
                service: "90ml Premix + 20ml Lime juice"
            },
            mama_africa: {
                name: "Mama Africa",
                color: "#e15f41", /* Ζεστό πορτοκαλί / τερακότα */
                ingredients: [
                    { name: "Rum", baseAmount: 400, unit: "ml" },
                    { name: "Lemon juice", baseAmount: 160, unit: "ml" },
                    { name: "Mango puree", baseAmount: 160, unit: "ml" },
                    { name: "Biscuit syrup", baseAmount: 160, unit: "ml" },
                    { name: "Otto's vermouth", baseAmount: 120, unit: "ml" }
                ],
                service: "125ml Premix + 30ml Pineapple juice"
            },
            kyoto: {
                name: "Kyoto",
                color: "#a55eea", /* Εξωτικό μωβ των ανθών */
                ingredients: [
                    { name: "Gin", baseAmount: 550, unit: "ml" },
                    { name: "Passionfruit puree", baseAmount: 220, unit: "ml" },
                    { name: "Triple sec", baseAmount: 220, unit: "ml" }
                ],
                service: "90ml Premix + 20ml Lime juice"
            },
            tiki_zombie: {
                name: "Tiki Zombie",
                color: "#ff3f34", /* Έντονο κόκκινο του Zombie */
                ingredients: [
                    { name: "White rum", baseAmount: 240, unit: "ml" },
                    { name: "Dark rum", baseAmount: 240, unit: "ml" },
                    { name: "Sugar syrup", baseAmount: 80, unit: "ml" },
                    { name: "Triple sec", baseAmount: 80, unit: "ml" },
                    { name: "Amaretto", baseAmount: 120, unit: "ml" },
                    { name: "Lemon juice", baseAmount: 160, unit: "ml" }
                ],
                service: "115ml Premix + 50ml Pineapple juice"
            },
            bahama_mama: {
                name: "Bahama Mama",
                color: "#ff7979", /* Ροζ του ηλιοβασιλέματος */
                ingredients: [
                    { name: "Rum", baseAmount: 350, unit: "ml" },
                    { name: "Malibu", baseAmount: 140, unit: "ml" },
                    { name: "Creme de mure", baseAmount: 105, unit: "ml" },
                    { name: "Orange juice", baseAmount: 175, unit: "ml" },
                    { name: "Lime juice", baseAmount: 140, unit: "ml" }
                ],
                service: "130ml Premix + 25ml Pineapple juice"
            },
            negroni: {
                name: "Negroni",
                color: "#c23616", /* Ρουμπινί Campari */
                ingredients: [
                    { name: "Gin", baseAmount: 300, unit: "ml" },
                    { name: "Campari", baseAmount: 300, unit: "ml" },
                    { name: "Martini Rosso", baseAmount: 300, unit: "ml" },
                    { name: "Water", baseAmount: 100, unit: "ml" }
                ],
                service: "Ready to serve!"
            }
        };

        let currentCocktail = 'happy_hawaiian';

        function selectCocktail(cocktailKey, element) {
            document.querySelectorAll('.cocktail-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            
            currentCocktail = cocktailKey;
            updateValues();
        }

        function updateValues() {
            const slider = document.getElementById('premixSlider');
            const sliderValue = parseInt(slider.value);
            const totalVolume = sliderValue * 100;
            
            const recipe = recipes[currentCocktail];
            
            document.documentElement.style.setProperty('--accent-color', recipe.color);
            
            const percentage = ((sliderValue - slider.min) / (slider.max - slider.min)) * 100;
            slider.style.background = `linear-gradient(to right, var(--accent-color) 0%, var(--accent-color) ${percentage}%, #25302a ${percentage}%, #25302a 100%)`;

            if (totalVolume === 1000) {
                document.getElementById('volumeDisplay').innerText = "1 lt";
            } else {
                document.getElementById('volumeDisplay').innerText = totalVolume + " ml";
            }

            const listContainer = document.getElementById('ingredientsList');
            listContainer.innerHTML = '';

            recipe.ingredients.forEach(ing => {
                let calculatedAmount = (ing.baseAmount / 10) * sliderValue;
                calculatedAmount = Math.round(calculatedAmount * 10) / 10;

                const row = document.createElement('div');
                row.className = 'ingredient-row';
                row.innerHTML = `
                    <span class="ing-name">${ing.name}</span>
                    <span class="ing-amount">${calculatedAmount} ${ing.unit}</span>
                `;
                listContainer.appendChild(row);
            });

            document.getElementById('serviceText').innerText = recipe.service;
        }

        window.onload = function() {
            updateValues();
        }
    </script>
</body>
</html>
